name: Release Codex plugin

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate marketplace and plugin
        run: python scripts/validate-codex-plugin.py
      - name: Check synchronized references
        run: python scripts/sync-codex-references.py --check
      - name: Test source discovery
        run: python -m unittest discover -s tests -v
      - name: Package tagged version
        run: python scripts/package-codex-plugin.py --expected-tag "$GITHUB_REF_NAME"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/*
          --verify-tag
          --generate-notes
          --title "DayZ Dev Codex plugin $GITHUB_REF_NAME"
